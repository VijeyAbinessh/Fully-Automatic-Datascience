{% extends "base.html" %}
{% block content %}
<h2>🧹 Auto Data Cleaner</h2>
<form method="post" enctype="multipart/form-data">
  <input type="file" name="file" required>
  <button type="submit">Clean</button>
</form>

{% for f in files %}
  <p><a href="/download/{{f}}">⬇ {{f}}</a></p>
{% endfor %}
{% endblock %}
